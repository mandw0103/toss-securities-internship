name: PR Body Template

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: pr-body-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-body:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate and update PR body
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');
            const pr = context.payload.pull_request;
            const baseSha = pr.base.sha;
            const headSha = pr.head.sha;
            const repoUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}`;

            // base..head 커밋을 오래된 순으로 (pull-request 스킬 규칙)
            const raw = execSync(
              `git log --reverse --format=%H%x09%h%x09%s ${baseSha}..${headSha}`,
              { encoding: 'utf8' }
            ).trim();

            const rows = raw
              ? raw.split('\n').map((line) => {
                  const [full, short, ...rest] = line.split('\t');
                  const subject = rest.join('\t').replace(/\|/g, '\\|');
                  return `| [\`${short}\`](${repoUrl}/commit/${full}) | ${subject} |`;
                })
              : [];

            const table = ['| 해시 | 메시지 |', '|------|--------|', ...rows].join('\n');

            const START = '<!-- AUTO:commits:start -->';
            const END = '<!-- AUTO:commits:end -->';
            const autoBlock = `${START}\n## Commits\n${table}\n${END}`;

            const currentBody = pr.body || '';
            const startIdx = currentBody.indexOf(START);
            const endIdx = currentBody.indexOf(END);

            let newBody;
            if (startIdx !== -1 && endIdx !== -1 && endIdx > startIdx) {
              // 마커 내부만 갱신, 그 외 작성자 입력은 보존
              newBody =
                currentBody.slice(0, startIdx) +
                autoBlock +
                currentBody.slice(endIdx + END.length);
            } else {
              // 마커가 없으면 본문 끝에 1회만 추가
              const prefix = currentBody.trim() ? `${currentBody.trim()}\n\n` : '';
              newBody = `${prefix}${autoBlock}`;
            }

            if (newBody !== currentBody) {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                body: newBody,
              });
            }

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: 'prTemplate action이 실패했습니다. PR 본문을 수동으로 입력해주세요.',
            });
