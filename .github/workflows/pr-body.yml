name: PR Body Template

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: pr-body-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  pr-body:
    runs-on: ubuntu-latest
    steps:
      - name: Generate and update PR body
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            const repoUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}`;

            // fork PR에서도 안전하게 동작하도록 PR head 코드를 checkout하지 않고 API로 커밋을 조회한다.
            const commits = await github.paginate(github.rest.pulls.listCommits, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr.number,
              per_page: 100,
            });

            const rows = commits.map((commit) => {
              const full = commit.sha;
              const short = full.slice(0, 7);
              const subject = commit.commit.message.split('\n')[0].replace(/\|/g, '\\|');
              return `| [\`${short}\`](${repoUrl}/commit/${full}) | ${subject} |`;
            });

            const table = ['| 해시 | 메시지 |', '|------|--------|', ...rows].join('\n');

            const START = '<!-- AUTO:commits:start -->';
            const END = '<!-- AUTO:commits:end -->';
            const autoBlock = `${START}\n## Commits\n${table}\n${END}`;

            const currentBody = pr.body || '';
            const startIdx = currentBody.indexOf(START);
            const endIdx = currentBody.indexOf(END);

            let newBody;
            if (startIdx !== -1 && endIdx !== -1 && endIdx > startIdx) {
              // 마커 내부만 갱신, 그 외 작성자 입력은 보존
              newBody =
                currentBody.slice(0, startIdx) +
                autoBlock +
                currentBody.slice(endIdx + END.length);
            } else {
              // 마커가 없으면 본문 끝에 1회만 추가
              const prefix = currentBody.trim() ? `${currentBody.trim()}\n\n` : '';
              newBody = `${prefix}${autoBlock}`;
            }

            if (newBody !== currentBody) {
              await github.rest.pulls.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                body: newBody,
              });
            }

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body: 'prTemplate action이 실패했습니다. PR 본문을 수동으로 입력해주세요.',
            });
